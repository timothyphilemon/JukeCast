<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Create Account — JukeCast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@300;400;500;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow-x: hidden; }
:root {
  --page: #f5f5f7;
  --black: #1d1d1f;
  --mid: #6e6e73;
  --light: #d2d2d7;
  --purple: #5847ed;
  --f: 'Instrument Sans', sans-serif;
}
body {
  font-family: var(--f);
  background: var(--page);
  color: var(--black);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10000;
  display: flex; align-items: center;
  padding: 0 6%; height: 52px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.nav-logo {
  font-family: "DM Sans", sans-serif; font-size: 22px; font-weight: 300;
  letter-spacing: 0.02em; color: var(--black); text-decoration: none;
  display: flex; align-items: center; gap: 8px;
}
.wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 72px 20px 40px; min-height: 100vh;
}
.card {
  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 24px; padding: 48px 40px;
  width: 100%; max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.5);
}
h1 {
  font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
  margin-bottom: 28px; text-align: center;
}
.input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.input-group input {
  font-family: var(--f); font-size: 15px; padding: 13px 16px;
  border: 1.5px solid var(--light); border-radius: 12px; outline: none;
  color: var(--black); background: var(--page);
  transition: border-color .2s, background .2s, box-shadow .2s;
}
.input-group input:focus {
  border-color: var(--purple); background: #fff;
  box-shadow: 0 0 0 3px rgba(88,71,237,0.1);
}
.input-group input::placeholder { color: var(--mid); }
.btn-submit {
  width: 100%; background: var(--purple); color: #fff;
  font-family: var(--f); font-size: 15px; font-weight: 600;
  padding: 13px; border-radius: 980px; border: none; cursor: pointer;
  transition: background .2s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-submit:hover:not(:disabled) { background: #4636d4; }
.btn-submit:active:not(:disabled) { transform: scale(0.98); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .6s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.footer-link {
  margin-top: 18px; text-align: center; font-size: 13px; color: var(--mid);
}
.footer-link a { color: var(--purple); text-decoration: none; }
.footer-link a:hover { text-decoration: underline; }
.msg {
  border-radius: 10px; padding: 11px 14px; font-size: 13px;
  margin-bottom: 16px; display: none;
}
.msg.error   { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
.msg.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/8NBch2A.png" alt="" style="height:20px;display:block;">
    jukecast
  </a>
</nav>

<div class="wrap">
  <div class="card">
    <h1>Create your account</h1>

    <div class="msg" id="msgBox"></div>

    <div class="input-group">
      <input type="email"    id="emailInput"    placeholder="Email address"   autocomplete="email">
      <input type="password" id="passwordInput" placeholder="Password"         autocomplete="new-password">
      <input type="password" id="confirmInput"  placeholder="Confirm password" autocomplete="new-password">
    </div>

    <button class="btn-submit" id="submitBtn" onclick="handleSignUp()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Create Account</span>
    </button>

    <div class="footer-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
</div>

<script type="module">
  // ─── PASTE YOUR FIREBASE CONFIG HERE ────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyDrhNvQ-7LqZVlxMfRE_q0oryaHGCJNiDU",
    authDomain:        "barplaymyp.firebaseapp.com",
    databaseURL:       "https://barplaymyp-default-rtdb.firebaseio.com",
    projectId:         "barplaymyp",
    storageBucket:     "barplaymyp.firebasestorage.app",
    messagingSenderId: "1071259901423",
    appId:             "1:1071259901423:web:fbe7a0257a5ac6ad15aa1a",
  }
  // ────────────────────────────────────────────────────────────────────────────

  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'
  import { getAuth, createUserWithEmailAndPassword,
           onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js'

  const app  = initializeApp(firebaseConfig)
  const auth = getAuth(app)

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'admin.html'
  })

  const emailInput    = document.getElementById('emailInput')
  const passwordInput = document.getElementById('passwordInput')
  const confirmInput  = document.getElementById('confirmInput')
  const submitBtn     = document.getElementById('submitBtn')
  const spinner       = document.getElementById('spinner')
  const btnText       = document.getElementById('btnText')
  const msgBox        = document.getElementById('msgBox')

  function showMsg(text, type = 'error') {
    msgBox.textContent   = text
    msgBox.className     = `msg ${type}`
    msgBox.style.display = 'block'
  }
  function clearMsg() { msgBox.style.display = 'none' }

  function setLoading(on) {
    submitBtn.disabled    = on
    spinner.style.display = on ? 'block' : 'none'
    btnText.textContent   = on ? 'Creating account...' : 'Create Account'
  }

  const FRIENDLY = {
    'auth/email-already-in-use': 'An account with that email already exists.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  }

  window.handleSignUp = async function() {
    clearMsg()
    const email    = emailInput.value.trim()
    const password = passwordInput.value
    const confirm  = confirmInput.value

    if (!email)    { emailInput.focus();    return }
    if (!password) { passwordInput.focus(); return }
    if (password !== confirm) { showMsg('Passwords don\'t match.'); confirmInput.focus(); return }
    if (password.length < 6) { showMsg('Password must be at least 6 characters.'); return }

    setLoading(true)
    try {
      await createUserWithEmailAndPassword(auth, email, password)
      window.location.href = 'admin.html'
    } catch (err) {
      showMsg(FRIENDLY[err.code] || `Sign-up failed: ${err.message}`)
    } finally {
      setLoading(false)
    }
  }

  confirmInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignUp() })
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') confirmInput.focus() })
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') passwordInput.focus() })
</script>

</body>
</html>
